# TukiFact — Nginx Reverse Proxy
# Handles SSL termination, static files, and routing

upstream api {
    server api:8080;
}

upstream web {
    server web:3000;
}

upstream ai {
    server ai:8090;
}

server {
    listen 80;
    server_name tukifact.net.pe www.tukifact.net.pe;

    # Redirect HTTP to HTTPS (uncomment when SSL is configured)
    # return 301 https://$host$request_uri;

    # For initial setup without SSL:
    include /etc/nginx/conf.d/locations.conf;
}

