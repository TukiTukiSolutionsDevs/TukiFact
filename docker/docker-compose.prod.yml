# TukiFact — Production Docker Compose
# Full stack: API + Web + Nginx + PostgreSQL + NATS + MinIO

services:
  # === Infrastructure ===
  postgres:
    image: postgres:18
    container_name: tukifact-postgres
    restart: always
    environment:
      POSTGRES_DB: ${PG_DATABASE:-tukifact}
      POSTGRES_USER: ${PG_USER:-tukifact}
      POSTGRES_PASSWORD: ${PG_PASSWORD:?PG_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER:-tukifact} -d ${PG_DATABASE:-tukifact}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  nats:
    image: nats:latest
    container_name: tukifact-nats
    restart: always
    command: ["-js", "-c", "/etc/nats/nats-server.conf"]
    volumes:
      - nats_data:/data
      - ./nats/nats-server.conf:/etc/nats/nats-server.conf
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8222/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - internal

  minio:
    image: minio/minio:latest
    container_name: tukifact-minio
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_USER:?MINIO_USER is required}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD:?MINIO_PASSWORD is required}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - internal

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $${MINIO_USER} $${MINIO_PASSWORD};
      mc mb local/tukifact-xml --ignore-existing;
      mc mb local/tukifact-pdf --ignore-existing;
      mc mb local/tukifact-cdr --ignore-existing;
      mc mb local/tukifact-certs --ignore-existing;
      echo 'Buckets ready';
      "
    environment:
      MINIO_USER: ${MINIO_USER}
      MINIO_PASSWORD: ${MINIO_PASSWORD}
    networks:
      - internal

  # === Application ===
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    container_name: tukifact-api
    restart: always
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: "Host=postgres;Port=5432;Database=${PG_DATABASE:-tukifact};Username=${PG_USER:-tukifact};Password=${PG_PASSWORD};Include Error Detail=false"
      Jwt__Secret: ${JWT_SECRET:?JWT_SECRET is required}
      Jwt__Issuer: "TukiFact"
      Jwt__Audience: "TukiFact"
      Nats__Url: "nats://nats:4222"
      MinIO__Endpoint: "minio:9000"
      MinIO__AccessKey: ${MINIO_USER}
      MinIO__SecretKey: ${MINIO_PASSWORD}
      Cors__FrontendUrl: "https://tukifact.net.pe"
      Sunat__Environment: ${SUNAT_ENV:-beta}
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health/live || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - internal

  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.web
    container_name: tukifact-web
    restart: always
    environment:
      NEXT_PUBLIC_API_URL: "https://tukifact.net.pe"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3000/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - internal

  ai:
    build:
      context: ..
      dockerfile: docker/Dockerfile.ai
    container_name: tukifact-ai
    restart: always
    environment:
      TUKIFACT_NATS_URL: "nats://nats:4222"
      TUKIFACT_API_BASE_URL: "http://api:8080"
      TUKIFACT_AI_PROVIDER: ${AI_PROVIDER:-stub}
      TUKIFACT_AI_API_KEY: ${AI_API_KEY:-}
      TUKIFACT_AI_MODEL: ${AI_MODEL:-gpt-4o-mini}
    depends_on:
      nats:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import httpx; httpx.get('http://localhost:8090/health').raise_for_status()\""]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - internal

  # === Reverse Proxy ===
  nginx:
    image: nginx:alpine
    container_name: tukifact-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./nginx/locations.conf:/etc/nginx/conf.d/locations.conf
      # Uncomment for SSL:
      # - ./nginx/ssl:/etc/nginx/ssl
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_healthy
      ai:
        condition: service_healthy
    networks:
      - internal

volumes:
  postgres_data:
  nats_data:
  minio_data:

networks:
  internal:
    driver: bridge
